interface:
  display_name: "MotionEyes Visual Analysis"
  short_description: "Analyze UI motion from frames using CV + vision."
  default_prompt: "Analyze the provided UI frames or capture a short sequence. Start grid-first: use grid/sprite views for coordinate-indexed motion reading, then fall back to raw frames+diff if overlays obscure details. Start with keyframe pairs and escalate to neighboring pairs or all-pairs when confidence is low. For each major claim, cite frame pair, artifact types, and confidence. Output annotated images plus analysis.json and summary.md."
